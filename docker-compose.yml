networks:
  entornexamen-net:
    driver: bridge

volumes:
  db-data:       # Volum Docker per a SQL Server (NTFS via WSL2 no és compatible amb SQLPAL)
  redis-data:    # Volum per a Redis (persistència AOF)
  dp-keys:       # Claus de DataProtection (antiforgery, ProtectedLocalStorage)
  api-backups:   # Còpies de seguretat JSON (exportació/importació)
  fotos-alumnes: # Fotos d'alumnes per a l'Entorn Examen
  nginx-logs:    # Logs JSON d'accés nginx, compartit amb l'API per a estadístiques de tràfic

services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: entornexamen-db
    environment:
      ACCEPT_EULA:        "Y"
      MSSQL_SA_PASSWORD:  "${MSSQL_SA_PASSWORD}"
      MSSQL_PID:          "Express"
      TZ:                 "${TZ:-Europe/Madrid}"
    expose:
      - "1433"
    volumes:
      - db-data:/var/opt/mssql
      - ./backups:/var/opt/mssql/backup   # Còpies de seguretat accessibles al sistema de fitxers
    networks:
      - entornexamen-net
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd",
             "-S", "localhost", "-U", "sa", "-P", "${MSSQL_SA_PASSWORD}",
             "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout:  5s
      retries:  12
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: entornexamen-redis
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy volatile-lru
    environment:
      TZ: "${TZ:-Europe/Madrid}"
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - entornexamen-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    restart: unless-stopped

  api:
    build:
      context:    .
      dockerfile: api/Dockerfile
    container_name: entornexamen-api
    environment:
      ASPNETCORE_ENVIRONMENT:          Production
      ASPNETCORE_URLS:                 "http://0.0.0.0:8080"
      ConnectionStrings__DefaultConnection: >
        Server=db;Database=EntornExamen;
        User Id=sa;Password=${MSSQL_SA_PASSWORD};
        TrustServerCertificate=True
      JwtSettings__Secret:          "${JWT_SECRET}"
      JwtSettings__ExpiryHours:     "${JWT_EXPIRY_HOURS}"
      Admin__Email:                 "${ADMIN_EMAIL}"
      Admin__Password:              "${ADMIN_PASSWORD}"
      Admin__Nom:                   "${ADMIN_NOM}"
      Admin__Cognoms:               "${ADMIN_COGNOMS}"
      Smtp__Host:                   "${SMTP_HOST}"
      Smtp__Port:                   "${SMTP_PORT}"
      Smtp__Username:               "${SMTP_USERNAME}"
      Smtp__Password:               "${SMTP_PASSWORD}"
      Smtp__FromAddress:            "${SMTP_FROM_ADDRESS}"
      Smtp__FromName:               "${SMTP_FROM_NAME}"
      App__WebUrl:                  "${APP_WEB_URL}"
      Redis__ConnectionString:      "redis:6379"
      TZ:                             "${TZ:-Europe/Madrid}"
      Logging__LogLevel__Default:     "${LOG_LEVEL:-Warning}"
      Logging__LogLevel__EntornExamen: "Information"
      Examen__DominiEmail:            "${EXAMEN_DOMINI_EMAIL:-sarria.salesians.cat}"
      Examen__CheckinIntervalSeconds: "${EXAMEN_CHECKIN_INTERVAL_SECONDS:-30}"
      Examen__SenseCheckinFactor:     "${EXAMEN_SENSE_CHECKIN_FACTOR:-2}"
      Examen__DesconnectatFactor:     "${EXAMEN_DESCONNECTAT_FACTOR:-4}"
      Examen__ModePro:                "${EXAMEN_MODE_PRO:-false}"
      Examen__DhcpLeasesPath:         "/data/dhcpd.leases"
      Examen__DnsLogPath:             "/data/dns-queries.log"
      Examen__NginxLogPath:           "/data/nginx/access.log"
      Examen__WebWwwrootPath:         "/app/wwwroot"
    expose:
      - "8080"
    volumes:
      - api-backups:/app/backups
      - fotos-alumnes:/app/wwwroot/fotos/alumnes
      - /var/lib/dhcp/dhcpd.leases:/data/dhcpd.leases:ro
      - /var/log/named/queries.log:/data/dns-queries.log:ro
      - nginx-logs:/data/nginx:ro
    networks:
      - entornexamen-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context:    .
      dockerfile: web/Dockerfile
    container_name: entornexamen-web
    environment:
      ASPNETCORE_ENVIRONMENT:  Production
      ASPNETCORE_URLS:         "http://0.0.0.0:8080"
      TZ:                      "${TZ:-Europe/Madrid}"
      Logging__LogLevel__Default:     "${LOG_LEVEL:-Warning}"
      Logging__LogLevel__EntornExamen: "Information"
      Logging__LogLevel__Microsoft.AspNetCore.Antiforgery: "Critical"
      ApiSettings__BaseUrl:    "http://api:8080"
      Redis__ConnectionString: "redis:6379"
      Examen__DhcpNetworkPrefix: "${EXAMEN_DHCP_NETWORK_PREFIX:-192.168.100.}"
      Brand__Nom:          "${BRAND_NOM:-Entorn d'Examens}"
      Brand__ShortNom:     "${BRAND_SHORT_NOM:-Examens}"
      Brand__Organitzacio: "${BRAND_ORGANITZACIO:-Salesians de Sarrià · Dept. d'Informàtica}"
      Brand__ColorPrimary: "${BRAND_COLOR_PRIMARY:-#CC0000}"
      Brand__ColorAppBar:  "${BRAND_COLOR_APPBAR:-#1e293b}"
      Brand__LogoUrl:      "${BRAND_LOGO_URL:-/images/logo2.png}"
      Brand__BgImageUrl:   "${BRAND_BG_IMAGE_URL:-/images/fons-salesians.png}"
    volumes:
      - dp-keys:/app/dp-keys
      - fotos-alumnes:/app/wwwroot/fotos/alumnes
      - ./branding:/app/wwwroot/branding:ro
    networks:
      - entornexamen-net
    depends_on:
      - api
      - redis
    restart: unless-stopped

  nginx:
    build:
      context:    ./nginx
      dockerfile: Dockerfile
    container_name: entornexamen-nginx
    environment:
      TZ: "${TZ:-Europe/Madrid}"
    ports:
      - "4445:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl
      - nginx-logs:/var/log/nginx
    networks:
      - entornexamen-net
    depends_on:
      - web
    restart: unless-stopped
