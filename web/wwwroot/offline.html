<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entorn d'Examens — Sense connexió</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Roboto, Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 48px 40px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .icon {
            font-size: 64px;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1e293b;
        }
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 28px;
        }
        button {
            background: #CC0000;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 12px 28px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #a30000; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📡</div>
        <h1>Sense connexió</h1>
        <p>
            L'Entorn d'Examens necessita connexió al servidor per funcionar.<br />
            Comprova la connexió a Internet i torna-ho a provar.
        </p>
        <button onclick="window.location.reload()">Tornar a intentar</button>
    </div>
</body>
</html>
