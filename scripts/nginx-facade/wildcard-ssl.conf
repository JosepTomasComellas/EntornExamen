# /etc/nginx/snippets/wildcard-ssl.conf
# Certificat wildcard *.sds.int compartit per tots els virtual hosts.
# Include des de cada bloc server: "include snippets/wildcard-ssl.conf;"

ssl_certificate     /ssl/wildcard.sds.int.pem;
ssl_certificate_key /ssl/wildcard.sds.int.key.pem;

ssl_protocols             TLSv1.2 TLSv1.3;
ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
ssl_prefer_server_ciphers off;
ssl_session_cache         shared:SSL:10m;
ssl_session_timeout       1d;
ssl_session_tickets       off;
