# /etc/nginx/sites-available/entorns.conf
# Façana única per a tots els serveis *.sds.int
#
# Instal·lació:
#   sudo cp 00-maps.conf        /etc/nginx/conf.d/
#   sudo cp wildcard-ssl.conf   /etc/nginx/snippets/
#   sudo cp entorns.conf        /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/entorns.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx


# ── Port 80: redirect permanent a HTTPS ──────────────────────────────────────
server {
    listen      80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}


# ── examen.sds.int → EntornExamen ────────────────────────────────────────────
#    Backend: nginx Docker (network_mode:host) escoltant a 127.0.0.1:4445
#    Requereix suport WebSocket per a Blazor Server / SignalR.
server {
    listen      443 ssl;
    listen [::]:443 ssl;
    server_name examen.sds.int;

    include snippets/wildcard-ssl.conf;

    # Capçaleres de proxy estàndard
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header X-Forwarded-Host   $host;

    # WebSocket (Blazor SignalR): l'upgrade s'ha de propagar fins al backend
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection $connection_upgrade;

    # Timeouts llargs: les sessions WebSocket de Blazor poden durar hores
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    location / {
        proxy_pass      https://127.0.0.1:4445;
        proxy_ssl_verify off;   # cert autosignat al backend
        client_max_body_size 50m;
    }
}


# ── moodle.sds.int → Moodle ──────────────────────────────────────────────────
#    Backend: nginx de Moodle, mogut de 0.0.0.0:443 a 127.0.0.1:8443
#    Requereix $CFG->sslproxy = true; al config.php de Moodle.
server {
    listen      443 ssl;
    listen [::]:443 ssl;
    server_name moodle.sds.int;

    include snippets/wildcard-ssl.conf;

    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    # Timeouts per a operacions llargues de Moodle (restauració de cursos, etc.)
    proxy_read_timeout  600s;
    proxy_send_timeout  600s;
    proxy_connect_timeout 60s;

    # Pujades grans de fitxers (videos, ZIP de backup, etc.)
    client_max_body_size 2g;

    location / {
        proxy_pass      https://127.0.0.1:8443;
        proxy_ssl_verify off;
    }
}


# ── srv-base.sds.int → Servidor de fitxers ───────────────────────────────────
#    Backend: nginx del servidor, mogut a 127.0.0.1:9443
server {
    listen      443 ssl;
    listen [::]:443 ssl;
    server_name srv-base.sds.int;

    include snippets/wildcard-ssl.conf;

    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    proxy_read_timeout  300s;
    proxy_send_timeout  300s;

    # Pujades/descàrregues de fitxers
    client_max_body_size 2g;

    location / {
        proxy_pass      https://127.0.0.1:9443;
        proxy_ssl_verify off;
    }
}
