events {
    worker_connections 1024;
}

http {
    # network_mode: host → nginx escolta directament a les interfícies del servidor
    # i veu les IPs reals dels alumnes sense cap NAT de Docker.
    # El bloc real_ip no és necessari en aquesta configuració.

    # ── Format de log JSON estructurat ───────────────────────────────────────────
    # Cada petició genera una línia JSON amb:
    #   time       → timestamp ISO8601
    #   ip         → IP real del client (després de real_ip)
    #   method     → verb HTTP
    #   uri        → ruta sol·licitada (sense query string)
    #   status     → codi de resposta (101 = WebSocket obert/tancat)
    #   bytes      → bytes enviats al client (inclou capçaleres)
    #   duration   → durada total de la petició/sessió WebSocket en segons
    #   connection → ID de connexió TCP (agrupa peticions keep-alive)
    #   conn_req   → número de petició dins la mateixa connexió TCP
    #   ups_time   → temps de resposta del backend upstream
    log_format json_exam escape=json
        '{"time":"$time_iso8601",'
        '"ip":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$uri",'
        '"status":$status,'
        '"bytes":$bytes_sent,'
        '"duration":$request_time,'
        '"connection":$connection,'
        '"conn_req":$connection_requests,'
        '"ups_time":"$upstream_response_time"}';

    access_log /var/log/nginx/access.log json_exam;

    # ── Capçaleres de seguretat globals ──────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"             always;
    add_header X-Content-Type-Options "nosniff"                always;
    add_header X-XSS-Protection       "1; mode=block"          always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Servidor HTTPS principal ──────────────────────────────────────────────────
    server {
        listen 4445 ssl;          # host mode: nginx gestiona el port directament
        server_name _;

        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;

        # HSTS (activar quan el certificat sigui de confiança i públic)
        # add_header Strict-Transport-Security "max-age=63072000" always;

        # ── WebSocket SignalR (Blazor Server) ────────────────────────────────────
        location /_blazor {
            proxy_pass         http://127.0.0.1:8081;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Proxy general cap a la web Blazor ────────────────────────────────────
        location / {
            proxy_pass         http://127.0.0.1:8081;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $http_connection;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host $host;
            proxy_buffer_size        128k;
            proxy_buffers        4   256k;
            proxy_busy_buffers_size  256k;
            client_max_body_size     10m;
        }
    }
}
